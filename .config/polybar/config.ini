[colors]

black=#45475A   
red=#F38BA8   
green=#A6E3A1   
yellow=#F9E2AF
blue=#89B4FA
magenta=#F5C2E7   
cyan=#94E2D5   
white=#BAC2DE

background = #0E1113 
;for workspaces highlight
background-alt = #181825
;text-color
foreground = #BAC2DE
;accent color
primary = #89B4FA
secondary = #ffb86c
alert = #ff5555
disabled = #e5e9f0
[bar/example]
width = 100%
height = 24pt
radius = 15

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

#font-0 = monospace;2
font-0 = JetBrainsMono Nerd Font:style=Bold:pixelsize=13;1
font-1 = JetBrainsMono Nerd Font:size=18;1
font-2 = Material Design Icons:style=Bold:size=13;1
font-3 = unifont:fontformat=truetype:size=13:antialias=true;


modules-left = xworkspaces xwindow 
modules-center = temperature memory cpu battery
modules-right = date wlan alsa xkeyboard 

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-foreground = ${colors.magenta}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
format-prefix = "Ôčí  "
format-prefix-foreground = ${colors.primary}
label = %title:0:60:...%

;[module/fil5 minutes agoesystem]
;type = internal/fs
;interval = 25

;mount-0 = /

;label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

;label-unmounted = %mountpoint% not mounted
;label-unmounted-foreground = ${colors.disabled}

[module/battery]
type = internal/battery
full-at = 98
low-at = 10

battery = BAT1
adapter = ACAD
poll-interval = 5

time-format = %H:%M
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>
format-low = <label-low> <animation-low>

label-charging = "%percentage%% "
label-discharging = "%percentage%% "
label-full = " 100% "
label-low = "%percentage% "

ramp-capacity-0 = "ÔČĄ "
ramp-capacity-1 = "ÔČÉ "
ramp-capacity-2 = "ÔČā "
ramp-capacity-3 = "ÔČĀ "
ramp-capacity-4 = "ÔČÄ "
bar-capacity-width = 10

animation-charging-0 = "ÔČĄ "
animation-charging-1 = "ÔČÉ "
animation-charging-2 = "ÔČā "
animation-charging-3 = "ÔČĀ "
animation-charging-4 = "ÔČÄ "
animation-charging-framerate = 910

animation-discharging-0 = "ÔČÄ "
animation-discharging-1 = "ÔČĀ "
animation-discharging-2 = "ÔČā "
animation-discharging-3 = "ÔČÉ "
animation-discharging-4 = "ÔČĄ "
animation-discharging-framerate = 500

animation-low-0 = "ÔČĄ  "
animation-low-1 = "ÔČÉ  "
animation-low-framerate = 1500

animation-low-foreground = ${colors.red}
format-charging-foreground = ${colors.foreground}
label-charging-foreground = ${colors.foreground}
format-discharging-foreground = ${colors.foreground}
label-discharging-foreground = ${colors.foreground}
format-full-prefix-foreground = #A0E8A2
format-foreground = ${colors.foreground}
;format-background = #2b2f37
ramp-capacity-foreground =  ${colors.green}
animation-charging-foreground = ${colors.green}

[module/alsa]
type = internal/alsa
format-volume = <ramp-volume> <label-volume>
format-volume-padding = 1
format-muted = ÓĽ®
format-muted-padding = 1
label-volume = %percentage%%
ramp-volume-0 = %{F#89B4FA}ÔÄß %{F-}
ramp-volume-1 = %{F#89B4FA}ÔÄß %{F-}
ramp-volume-2 = %{F#89B4FA}ÔÄß %{F-}
ramp-volume-3 = %{F#89B4FA}ÔÄß %{F-}
ramp-volume-4 = %{F#89B4FA}ÔÄß %{F-}
ramp-volume-5 = %{F#89B4FA}ÔÄ® %{F-}
ramp-volume-6 = %{F#89B4FA}ÔÄ® %{F-}
ramp-volume-7 = %{F#89B4FA}ÔÄ® %{F-}
ramp-volume-8 = %{F#89B4FA}ÔÄ® %{F-}
ramp-volume-9 = %{F#89B4FA}ÔÄ® %{F-}
ramp-headphones-0 = ÔÄ•
ramp-headphones-1 = ÔÄ•
format-volume-foreground = ${colors.foreground}
format-muted-foreground = ${colors.red}

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 70

format = <ramp> <label>
format-warn = <ramp> <label-warn>
format-padding = 0 
label = %temperature%
label-warn = %temperature%
ramp-0 = "Ôčú"
ramp-foreground = ${colors.cyan}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

format-prefix = "ÔĄú  "
format-prefix-foreground = ${colors.primary}
label-layout = %layout%
label-layout-foreground = ${colors.foreground}

label-indicator-padding = 1
;label-indicator-margin = 1
label-indicator-foreground = ${colors.red}
;label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÓŅÖ  "
format-prefix-foreground = ${colors.yellow}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôíľ "
format-prefix-foreground = ${colors.magenta}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 10
format-connected = <label-connected>
format-disconnected = <label-disconnected>
format-prefix = "Ôáę "
format-prefix-foreground = ${colors.primary}
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless

format-connected-prefix = "Ôáę  "
format-connected-prefix-foreground = ${colors.primary}

label-connected = %essid% 
;  %{F#F0C674}%ifname%%{F-} - wlo1
;[module/eth]
;inherit = network-base
;interface-type = wired
;label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %{F#89B4FA}ÔÄó %{F-} %H:%M
date-alt = %{F#89B4FA}ÔĄ≥%{F-} %Y-%m-%d %H:%M:%S

;format-date-alt-prefix = "ÔĄ≥ "

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
