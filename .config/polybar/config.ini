[colors]
background = #2e3440
background-alt = #3b4252
foreground = #d8dee9
primary = #7aa2f7
secondary = #ffb86c
alert = #ff5555
disabled = #e5e9f0
[bar/example]
width = 100%
height = 24pt
radius = 15

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

#font-0 = monospace;2
font-0 = JetBrainsMono Nerd Font:style=Bold:pixelsize=13;1
font-1 = JetBrainsMono Nerd Font:size=18;1
font-2 = Material Design Icons:style=Bold:size=13;1
font-3 = unifont:fontformat=truetype:size=13:antialias=true;


modules-left = xworkspaces xwindow
modules-center = date wlan alsa xkeyboard 
modules-right = pulseaudio temperature memory cpu 

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
format-prefix = "Ôčí  "
format-prefix-foreground = ${colors.primary}
label = %title:0:60:...%

;[module/fil5 minutes agoesystem]
;type = internal/fs
;interval = 25

;mount-0 = /

;label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

;label-unmounted = %mountpoint% not mounted
;label-unmounted-foreground = ${colors.disabled}

[module/alsa]
type = internal/alsa
format-volume = <ramp-volume> <label-volume>
format-volume-padding = 1
format-muted = ÓĽ®
format-muted-padding = 1
label-volume = %percentage%%
ramp-volume-0 = %{F#d35f5e}ÔÄß%{F-}
ramp-volume-1 = %{F#d35f5e}ÔÄß%{F-}
ramp-volume-2 = %{F#d35f5e}ÔÄß%{F-}
ramp-volume-3 = %{F#d35f5e}ÔÄß%{F-}
ramp-volume-4 = %{F#d35f5e}ÔÄß%{F-}
ramp-volume-5 = %{F#d35f5e}ÔÄ®%{F-}
ramp-volume-6 = %{F#d35f5e}ÔÄ®%{F-}
ramp-volume-7 = %{F#d35f5e}ÔÄ®%{F-}
ramp-volume-8 = %{F#d35f5e}ÔÄ®%{F-}
ramp-volume-9 = %{F#d35f5e}ÔÄ®%{F-}
ramp-headphones-0 = ÔÄ•
ramp-headphones-1 = ÔÄ•
format-volume-foreground = ${colors.foreground}
format-muted-foreground = #d35f5e

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 70

format = <ramp> <label>
format-warn = <ramp> <label-warn>
format-padding = 0 
label = %temperature%
label-warn = %temperature%
ramp-0 = "Ôčú"
ramp-foreground = #a4ebf3

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

format-prefix = "ÔĄú  "
format-prefix-foreground = ${colors.primary}
label-layout = %layout%
label-layout-foreground = ${colors.foreground}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÓŅÖ  "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôíľ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 10
format-connected = <label-connected>
format-disconnected = <label-disconnected>
format-prefix = "Ôáę "
format-prefix-foreground = ${colors.primary}
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless

format-connected-prefix = "Ôáę  "
format-connected-prefix-foreground = ${colors.primary}

label-connected = %essid% 
;  %{F#F0C674}%ifname%%{F-} - wlo1
;[module/eth]
;inherit = network-base
;interface-type = wired
;label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %{F#81a1c1}ÔÄó %{F-} %H:%M
date-alt = %{F#81a1c1}ÔĄ≥%{F-} %Y-%m-%d %H:%M:%S

#format-date-alt-prefix = "ÔĄ≥ "

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
